<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Elements of PureScript Style &mdash; Review</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="review.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1>The Elements of PureScript Style</h1>
      <p class="subtitle">Review Draft &mdash; 164 entries + 15 De Gustibus</p>
    </header>

    <div class="controls">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="unreviewed">Unreviewed</button>
        <button class="filter-btn" data-filter="good">Good</button>
        <button class="filter-btn" data-filter="poor">Poor</button>
        <button class="filter-btn" data-filter="wrong">Wrong</button>
        <button class="filter-btn" data-filter="obsolete">Obsolete</button>
        <button class="filter-btn" data-filter="taste">Taste</button>
        <button class="filter-btn" data-filter="degustibus">De Gustibus</button>
      </div>
      <div class="stats" id="stats"></div>
    </div>

    <div id="entries"></div>

    <div class="footer"></div>
  </div>

  <div class="export-bar">
    <span id="stats-bar"></span>
    <button id="export-btn" class="link-btn">Export votes as JSON</button>
    <span>&middot;</span>
    <button id="clear-btn" class="link-btn">Clear all votes</button>
  </div>

  <script src="review.js"></script>
</body>
</html>
